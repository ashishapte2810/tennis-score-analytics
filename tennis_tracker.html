<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Court Tracker">
<meta name="theme-color" content="#0f1923">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Court Tracker — Tennis Score</title>
<style>
  :root {
    --bg: #0f1923;
    --surface: #1a2d3d;
    --surface-raised: #223347;
    --border: rgba(200,228,32,0.15);
    --border-strong: rgba(200,228,32,0.3);
    --accent: #c8e420;
    --accent-dim: rgba(200,228,32,0.12);
    --p1: #c8e420;
    --p1-dim: rgba(200,228,32,0.15);
    --p2: #38d9f5;
    --p2-dim: rgba(56,217,245,0.15);
    --text: #e8edf2;
    --text-secondary: #7a90a8;
    --text-muted: #4a6078;
    --danger: #e84040;
    --danger-dim: rgba(232,64,64,0.12);
    --success: #2dce6e;
    --radius: 14px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100dvh; height: 100%;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation; overscroll-behavior: none;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

  /* SETUP */
  #s-setup { flex: 1; display: flex; flex-direction: column; padding: 2rem 1.5rem; }
  .setup-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; }
  .setup-title { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); margin-bottom: 2rem; line-height: 1.1; }
  .resume-card { background: var(--accent-dim); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.5rem; display: none; }
  .resume-card .rc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .resume-card .rc-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .resume-card .rc-detail { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
  .resume-card .rc-btns { display: flex; gap: 8px; }
  .field-group { margin-bottom: 1.25rem; }
  .field-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px; }
  .field-group input, .field-group select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; font-family: inherit; padding: 12px 14px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; appearance: none; }
  .field-group input:focus, .field-group select:focus { border-color: var(--accent); }
  .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .btn-primary { width: 100%; padding: 16px; background: var(--accent); color: #0f1923; font-size: 15px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; border: none; border-radius: var(--radius); cursor: pointer; margin-top: auto; font-family: inherit; }
  .btn-primary:active { opacity: 0.8; }
  .serve-pick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .serve-opt { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); font-size: 14px; font-weight: 600; border-radius: var(--radius-sm); padding: 11px 8px; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .serve-opt.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); padding: 8px 14px; cursor: pointer; font-family: inherit; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); padding: 8px 14px; cursor: pointer; font-family: inherit; }

  /* MATCH */
  #s-match { flex: 1; display: none; flex-direction: column; }
  .saved-flash { text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--success); padding: 5px 0; background: var(--surface); display: none; }

  .scoreboard { background: var(--surface); padding: 1.25rem 1.5rem 1rem; }
  .sb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .sb-label { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
  .sb-status { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.04em; }
  .col-headers { display: flex; align-items: center; gap: 10px; padding: 0 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
  .ch-spacer { width: 6px; flex-shrink: 0; }
  .ch-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); width: 20px; text-align: center; }
  .ch-games { width: 32px; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .ch-pts { width: 44px; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .player-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .player-row:last-of-type { border-bottom: none; }
  .srv-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background 0.2s; }
  .srv-indicator.on { background: var(--accent); }
  .srv-indicator.off { background: transparent; }
  .player-name { flex: 1; font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; letter-spacing: -0.01em; }
  .player-name.p0 { color: var(--p1); }
  .player-name.p1 { color: var(--p2); }
  .pts-val.p0 { color: var(--p1); }
  .pts-val.p1 { color: var(--p2); }
  .set-scores { display: flex; gap: 4px; margin-right: 4px; }
  .set-pip { width: 20px; text-align: center; font-size: 13px; font-weight: 700; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .set-pip.dim { color: var(--text-muted); }
  .games-val { width: 32px; text-align: center; font-size: 24px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); font-variant-numeric: tabular-nums; }
  .pts-val { width: 44px; text-align: center; font-size: 26px; font-weight: 900; letter-spacing: -0.04em; color: var(--accent); font-variant-numeric: tabular-nums; }

  /* Point buttons */
  /* Serve toggle strip */
  .serve-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: var(--bg); height: 100px; flex-shrink: 0; padding: 10px 14px; border-top: 1px solid var(--border); }
  .serve-strip-label { display: none; }
  .serve-tog { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; font-family: inherit; transition: background 0.1s, border-color 0.1s; }
  .serve-tog .tog-label { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-muted); transition: color 0.1s; }
  .serve-tog .tog-sub { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); transition: color 0.1s; }
  .serve-tog.tog-1st.active { background: rgba(99,179,237,0.12); }
  .serve-tog.tog-1st.active .tog-label { color: #63b3ed; }
  .serve-tog.tog-1st.active .tog-sub { color: #63b3ed; }
  .serve-tog.tog-2nd.active { background: rgba(251,146,60,0.12); }
  .serve-tog.tog-2nd.active .tog-label { color: #fb923c; }
  .serve-tog.tog-2nd.active .tog-sub { color: #fb923c; }
  .serve-tog.tog-df .tog-label { color: var(--danger); opacity: 0.6; }
  .serve-tog.tog-df .tog-sub { color: var(--danger); opacity: 0.6; }
  .serve-tog.tog-df:active { background: var(--danger-dim); }

  .pt-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); height: 220px; flex-shrink: 0; }
  .pt-btn { background: var(--bg); border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; gap: 6px; transition: background 0.1s; font-family: inherit; }
  .pt-btn.p0:active { background: var(--p1-dim); }
  .pt-btn.p1:active { background: var(--p2-dim); }
  .pt-btn .btn-name { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; text-align: center; line-height: 1.1; word-break: break-word; }
  .pt-btn.p0 .btn-name { color: var(--p1); }
  .pt-btn.p1 .btn-name { color: var(--p2); }
  .pt-btn .btn-sub { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }

  /* Controls */
  .controls { background: var(--surface); padding: 12px 1.25rem; display: flex; gap: 8px; border-top: 1px solid var(--border); }
  .ctrl-btn { flex: 1; background: var(--surface-raised); border: 1px solid var(--border); color: var(--text-secondary); font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-radius: var(--radius-sm); padding: 10px 4px; cursor: pointer; font-family: inherit; }
  .ctrl-btn:active { border-color: var(--accent); color: var(--text); }
  .ctrl-btn:disabled { opacity: 0.35; pointer-events: none; }
  .confirm-bar { background: var(--danger-dim); border-top: 1px solid var(--danger); padding: 10px 1.25rem; display: none; align-items: center; justify-content: space-between; gap: 10px; }
  .confirm-bar span { font-size: 13px; font-weight: 600; color: var(--danger); }
  .confirm-bar .cb-btns { display: flex; gap: 8px; }
  .export-bar { background: var(--surface); padding: 10px 1.25rem; display: flex; gap: 8px; border-top: 1px solid var(--border); }

  /* Log */
  .log-section { background: var(--bg); padding: 1rem 1.5rem; }
  .log-section-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .log-scroll { max-height: 130px; overflow-y: auto; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .log-entry:last-child { border-bottom: none; }
  .log-winner { font-size: 12px; font-weight: 700; }
  .log-winner.p0 { color: var(--p1); }
  .log-winner.p1 { color: var(--p2); }
  .log-ctx { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.3; }
  .log-tags { font-size: 10px; color: var(--accent); opacity: 0.75; }

  /* END */
  #s-end { flex: 1; display: none; flex-direction: column; }
  .end-hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 2rem; text-align: center; background: var(--surface); }
  .end-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
  .end-winner { font-size: 36px; font-weight: 900; letter-spacing: -0.04em; color: var(--text); line-height: 1; margin-bottom: 8px; }
  .end-score { font-size: 20px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.06em; font-variant-numeric: tabular-nums; margin-bottom: 2rem; }
  .end-actions { display: flex; gap: 10px; width: 100%; }
  .end-log-section { padding: 1.25rem 1.5rem; }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP -->
  <div id="s-setup">
    <div class="setup-eyebrow">Court Tracker</div>
    <div class="setup-title">New<br>Match</div>
    <div id="resume-card" class="resume-card">
      <div class="rc-label">Match in progress</div>
      <div class="rc-title" id="rc-title"></div>
      <div class="rc-detail" id="rc-detail"></div>
      <div class="rc-btns">
        <button class="btn-secondary" style="flex:1;" onclick="resumeMatch()">Resume</button>
        <button class="btn-ghost" style="flex:1;" onclick="clearSaved()">Discard</button>
      </div>
    </div>
    <div class="fields-row">
      <div class="field-group">
        <label class="field-label">Player 1</label>
        <input id="inp-p1" type="text" value="Player 1" oninput="updateServeLabels()" />
      </div>
      <div class="field-group">
        <label class="field-label">Player 2</label>
        <input id="inp-p2" type="text" value="Player 2" oninput="updateServeLabels()" />
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Format</label>
      <select id="inp-fmt">
        <option value="3">Best of 3 sets</option>
        <option value="5">Best of 5 sets</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label">Deciding set</label>
      <select id="inp-dec">
        <option value="tb">Tiebreak at 6-6</option>
        <option value="adv">Advantage (no tiebreak)</option>
        <option value="stb">Super tiebreak (first to 10)</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label">First serve</label>
      <div class="serve-pick">
        <button type="button" class="serve-opt active" id="srv-btn-0" onclick="pickServe(0)">Player 1</button>
        <button type="button" class="serve-opt" id="srv-btn-1" onclick="pickServe(1)">Player 2</button>
      </div>
    </div>
    <button class="btn-primary" onclick="startMatch()">Start Match</button>
  </div>

  <!-- MATCH -->
  <div id="s-match">
    <div class="scoreboard">
      <div class="sb-header">
        <span class="sb-label">Court Tracker</span>
        <span class="sb-status" id="sb-status">Set 1</span>
      </div>
      <div class="col-headers">
        <span class="ch-spacer"></span>
        <span style="flex:1;"></span>
        <span id="ch-sets" style="display:flex;gap:4px;margin-right:4px;"></span>
        <span class="ch-games">G</span>
        <span style="width:6px;"></span>
        <span class="ch-pts">Pts</span>
      </div>
      <div class="player-row">
        <span class="srv-indicator off" id="dot0"></span>
        <span class="player-name p0" id="nm0">P1</span>
        <div class="set-scores" id="sets0"></div>
        <div class="games-val" id="g0">0</div>
        <div style="width:6px;"></div>
        <div class="pts-val p0" id="p0">0</div>
      </div>
      <div class="player-row">
        <span class="srv-indicator off" id="dot1"></span>
        <span class="player-name p1" id="nm1">P2</span>
        <div class="set-scores" id="sets1"></div>
        <div class="games-val" id="g1">0</div>
        <div style="width:6px;"></div>
        <div class="pts-val p1" id="p1">0</div>
      </div>
    </div>

    <div class="pt-buttons">
      <button class="pt-btn p0" onclick="awardPoint(0)">
        <div class="btn-name" id="blbl0">Player 1</div>
        <div class="btn-sub">won point</div>
      </button>
      <button class="pt-btn p1" onclick="awardPoint(1)">
        <div class="btn-name" id="blbl1">Player 2</div>
        <div class="btn-sub">won point</div>
      </button>
    </div>
    <div class="serve-strip">
      <span class="serve-strip-label">Serve</span>
      <button class="serve-tog tog-1st active" id="tog-1st" onclick="setServeType('1st')">
        <div class="tog-label">1st</div>
        <div class="tog-sub">serve</div>
      </button>
      <button class="serve-tog tog-2nd" id="tog-2nd" onclick="setServeType('2nd')">
        <div class="tog-label">2nd</div>
        <div class="tog-sub">serve</div>
      </button>
      <button class="serve-tog tog-df" id="tog-df" onclick="doubleFault()">
        <div class="tog-label">DF</div>
        <div class="tog-sub">double fault</div>
      </button>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-undo" onclick="undo()" disabled>Undo</button>
      <button class="ctrl-btn" id="btn-reset" onclick="askReset()">Reset</button>
    </div>

    <div class="confirm-bar" id="confirm-bar">
      <span>Reset match?</span>
      <div class="cb-btns">
        <button class="btn-ghost" onclick="cancelReset()">Cancel</button>
        <button class="btn-ghost" style="color:var(--danger);border-color:var(--danger);" onclick="doReset()">Reset</button>
      </div>
    </div>

    <div class="export-bar">
      <button class="ctrl-btn" onclick="exportCSV()">Export CSV</button>
    </div>

    <div class="saved-flash" id="saved-flash">Saved</div>
    <div class="log-section">
      <div class="log-section-label">Point Log</div>
      <div class="log-scroll" id="log"></div>
    </div>
  </div>

  <!-- END -->
  <div id="s-end">
    <div class="end-hero">
      <div class="end-eyebrow">Match complete</div>
      <div class="end-winner" id="end-winner"></div>
      <div class="end-score" id="end-score"></div>
      <div class="end-actions">
        <button class="ctrl-btn" onclick="exportCSV()">Export CSV</button>
        <button class="btn-primary" style="flex:2;margin-top:0;" onclick="initSetup()">New Match</button>
      </div>
    </div>
    <div class="end-log-section">
      <div class="log-section-label">Full Point Log</div>
      <div class="log-scroll" id="log2" style="max-height:220px;"></div>
    </div>
  </div>

</div>
<script>
var M = null, HIST = [], PTS = ['0','15','30','40'], SAVE_KEY = 'court_tracker_v2';
var firstServer = 0;

function pickServe(idx) {
  firstServer = idx;
  document.getElementById('srv-btn-0').className = 'serve-opt' + (idx === 0 ? ' active' : '');
  document.getElementById('srv-btn-1').className = 'serve-opt' + (idx === 1 ? ' active' : '');
}

function updateServeLabels() {
  var p1 = document.getElementById('inp-p1').value.trim() || 'Player 1';
  var p2 = document.getElementById('inp-p2').value.trim() || 'Player 2';
  document.getElementById('srv-btn-0').textContent = p1;
  document.getElementById('srv-btn-1').textContent = p2;
}

function isDeciding() { return M.completedSets.length === M.totalSets - 1; }

function save() { try { localStorage.setItem(SAVE_KEY, JSON.stringify({ state: M })); } catch(e) {} }
function loadSaved() { try { return JSON.parse(localStorage.getItem(SAVE_KEY)); } catch(e) { return null; } }
function clearSaved() { try { localStorage.removeItem(SAVE_KEY); } catch(e) {} document.getElementById('resume-card').style.display = 'none'; }

function checkResume() {
  var d = loadSaved();
  if (d && d.state && !d.state.done) {
    document.getElementById('resume-card').style.display = 'block';
    document.getElementById('rc-title').textContent = d.state.names[0] + ' vs ' + d.state.names[1];
    var sets = d.state.completedSets.map(function(s) { return s[0] + '-' + s[1]; }).join(' ');
    document.getElementById('rc-detail').textContent = (sets ? 'Sets: ' + sets + ' | ' : '') + 'Games: ' + d.state.games[0] + '-' + d.state.games[1];
  }
}

function resumeMatch() {
  var d = loadSaved(); if (!d) return;
  M = d.state; if (!M.pointLog) M.pointLog = []; if (!M.pointNum) M.pointNum = 0;
  HIST = [];
  document.getElementById('log').innerHTML = '';
  M.pointLog.forEach(function(e) { appendLogDOM(e.winner, e.winnerIdx || 0, e.ctx, e.score, e.serve); });
  showMatch();
}

function startMatch() {
  var p1 = document.getElementById('inp-p1').value.trim() || 'Player 1';
  var p2 = document.getElementById('inp-p2').value.trim() || 'Player 2';
  var fmt = parseInt(document.getElementById('inp-fmt').value);
  var dec = document.getElementById('inp-dec').value;
  M = {
    names: [p1, p2], setsNeeded: fmt === 5 ? 3 : 2, totalSets: fmt, dec: dec,
    completedSets: [], games: [0, 0], pts: [0, 0], serving: firstServer,
    mode: 'normal', tbPts: [0, 0], tbServeToggle: 0, done: false,
    pointLog: [], pointNum: 0
  };
  HIST = []; clearSaved();
  document.getElementById('log').innerHTML = '';
  showMatch();
}

function showMatch() {
  document.getElementById('s-setup').style.display = 'none';
  document.getElementById('s-match').style.display = 'flex';
  document.getElementById('s-match').style.flexDirection = 'column';
  document.getElementById('s-end').style.display = 'none';
  document.getElementById('nm0').textContent = M.names[0];
  document.getElementById('nm1').textContent = M.names[1];
  document.getElementById('blbl0').textContent = M.names[0];
  document.getElementById('blbl1').textContent = M.names[1];
  document.getElementById('btn-undo').disabled = HIST.length === 0;
  cancelReset(); render();
}

function initSetup() {
  M = null; HIST = [];
  document.getElementById('s-setup').style.display = 'flex';
  document.getElementById('s-match').style.display = 'none';
  document.getElementById('s-end').style.display = 'none';
  checkResume();
}

function askReset() { document.getElementById('confirm-bar').style.display = 'flex'; document.getElementById('btn-reset').style.display = 'none'; }
function cancelReset() { document.getElementById('confirm-bar').style.display = 'none'; document.getElementById('btn-reset').style.display = ''; }
function doReset() { cancelReset(); clearSaved(); initSetup(); }

function snap() { return JSON.parse(JSON.stringify(M)); }

function scoreLabel() {
  var sets = M.completedSets.map(function(s) { return s[0] + '-' + s[1]; }).join(' ');
  return (sets ? sets + ' | ' : '') + ptsDisplay(0) + '-' + ptsDisplay(1) + ' | G:' + M.games[0] + '-' + M.games[1];
}

var _serveType = '1st';

function setServeType(t) {
  _serveType = t;
  document.getElementById('tog-1st').className = 'serve-tog tog-1st' + (t === '1st' ? ' active' : '');
  document.getElementById('tog-2nd').className = 'serve-tog tog-2nd' + (t === '2nd' ? ' active' : '');
}

function doubleFault() {
  if (!M || M.done) return;
  var receiver = 1 - M.serving;
  HIST.push(snap());
  M.pointNum = (M.pointNum || 0) + 1;
  var ctx = getCtx(), score = scoreLabel(), srv = M.names[M.serving];
  if (M.mode === 'tiebreak') scoreTB(receiver, 7);
  else if (M.mode === 'supertb') scoreTB(receiver, 10);
  else scoreNormal(receiver);
  var ts = new Date().toISOString();
  var entry = { point: M.pointNum, winner: M.names[receiver], winnerIdx: receiver, server: srv, set: M.completedSets.length + 1, ctx: ctx, score: score, mode: M.mode === 'normal' ? 'regular' : M.mode, ts: ts, serve: 'Double Fault' };
  M.pointLog.push(entry);
  appendLogDOM(entry.winner, entry.winnerIdx, entry.ctx, entry.score, entry.serve);
  setServeType('1st');
  save(); flashSaved();
  document.getElementById('btn-undo').disabled = false;
  render();
}

function awardPoint(w) {
  if (!M || M.done) return;
  HIST.push(snap());
  M.pointNum = (M.pointNum || 0) + 1;
  var ctx = getCtx(), score = scoreLabel(), srv = M.names[M.serving];
  var serveType = _serveType;
  if (M.mode === 'tiebreak') scoreTB(w, 7);
  else if (M.mode === 'supertb') scoreTB(w, 10);
  else scoreNormal(w);
  var ts = new Date().toISOString();
  var entry = { point: M.pointNum, winner: M.names[w], winnerIdx: w, server: srv, set: M.completedSets.length + 1, ctx: ctx, score: score, mode: M.mode === 'normal' ? 'regular' : M.mode, ts: ts, serve: serveType };
  M.pointLog.push(entry);
  appendLogDOM(entry.winner, entry.winnerIdx, entry.ctx, entry.score, entry.serve);
  setServeType('1st'); // reset to 1st after every point
  save(); flashSaved();
  document.getElementById('btn-undo').disabled = false;
  render();
}

function scoreNormal(w) {
  M.pts[w]++;
  if (M.pts[w] >= 4 && M.pts[w] - M.pts[1 - w] >= 2) winGame(w);
}
function scoreTB(w, target) {
  M.tbPts[w]++; M.tbServeToggle++;
  if (M.tbServeToggle === 1 || M.tbServeToggle % 2 === 0) M.serving = 1 - M.serving;
  if (M.tbPts[w] >= target && M.tbPts[w] - M.tbPts[1 - w] >= 2) winSet(w);
}
function winGame(w) {
  M.games[w]++; M.pts = [0, 0]; M.serving = 1 - M.serving;
  var gw = M.games[w], gl = M.games[1 - w], dec = isDeciding();
  if ((gw >= 6 && gw - gl >= 2) || (gw === 7 && gl === 5)) { winSet(w); }
  else if (gw === 6 && gl === 6) {
    if (dec && M.dec === 'adv') { /* keep playing */ }
    else { M.mode = 'tiebreak'; M.tbPts = [0, 0]; M.tbServeToggle = 0; }
  } else if (dec && M.dec === 'adv' && gw >= 7 && gw - gl >= 2) { winSet(w); }
}
function winSet(w) {
  var g0 = M.games[0], g1 = M.games[1];
  if (M.mode === 'tiebreak') { g0 = w === 0 ? 7 : 6; g1 = w === 1 ? 7 : 6; }
  else if (M.mode === 'supertb') { g0 = w === 0 ? 1 : 0; g1 = w === 1 ? 1 : 0; }
  M.completedSets.push([g0, g1]);
  M.games = [0, 0]; M.pts = [0, 0]; M.tbPts = [0, 0]; M.tbServeToggle = 0; M.mode = 'normal';
  var won = M.completedSets.filter(function(s) { return s[w] > s[1 - w]; }).length;
  if (won >= M.setsNeeded) { M.done = true; finishMatch(w); return; }
  if (isDeciding() && M.dec === 'stb') { M.mode = 'supertb'; M.tbPts = [0, 0]; M.tbServeToggle = 0; }
}
function finishMatch(w) {
  save();
  var sets = M.completedSets.map(function(s) { return s[0] + '-' + s[1]; }).join('  ');
  document.getElementById('end-winner').textContent = M.names[w] + ' wins';
  document.getElementById('end-score').textContent = sets;
  document.getElementById('log2').innerHTML = document.getElementById('log').innerHTML;
  document.getElementById('s-match').style.display = 'none';
  document.getElementById('s-end').style.display = 'flex';
  document.getElementById('s-end').style.flexDirection = 'column';
}
function flipServe() {
  if (!M) return; HIST.push(snap()); M.serving = 1 - M.serving;
  save(); document.getElementById('btn-undo').disabled = false; render();
}
function undo() {
  if (!HIST.length) return;
  M = HIST.pop();
  var log = document.getElementById('log');
  if (log.lastElementChild) log.removeChild(log.lastElementChild);
  save(); document.getElementById('btn-undo').disabled = HIST.length === 0; cancelReset(); render();
}
function getCtx() {
  if (M.mode === 'tiebreak') return 'Set ' + (M.completedSets.length + 1) + ' TB';
  if (M.mode === 'supertb') return 'Super TB';
  return 'S' + (M.completedSets.length + 1) + ' G' + (M.games[0] + M.games[1] + 1);
}
function appendLogDOM(winner, winnerIdx, ctx, score, serve) {
  var log = document.getElementById('log');
  var d = document.createElement('div'); d.className = 'log-entry';
  var tag = serve ? '<br><span class="log-tags">' + esc(serve) + ' serve</span>' : '';
  d.innerHTML = '<span class="log-winner p' + winnerIdx + '">' + esc(winner) + '</span><span class="log-ctx">' + esc(ctx) + '<br>' + esc(score) + tag + '</span>';
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function ptsDisplay(idx) {
  if (M.mode === 'tiebreak' || M.mode === 'supertb') return String(M.tbPts[idx]);
  var pw = M.pts[0], pl = M.pts[1];
  if (pw >= 3 && pl >= 3) { if (pw === pl) return 'D'; return (pw > pl ? idx === 0 : idx === 1) ? 'Ad' : '-'; }
  return PTS[M.pts[idx]] || '0';
}
function flashSaved() {
  var f = document.getElementById('saved-flash'); f.style.display = 'block';
  clearTimeout(f._t); f._t = setTimeout(function() { f.style.display = 'none'; }, 900);
}
function exportCSV() {
  if (!M || !M.pointLog || !M.pointLog.length) { alert('No points recorded yet.'); return; }
  var rows = ['point,timestamp,winner,server,set,context,score_before,mode,serve'];
  M.pointLog.forEach(function(e) {
    rows.push([e.point, e.ts || '', '"' + e.winner + '"', '"' + e.server + '"', e.set, '"' + e.ctx + '"', '"' + e.score + '"', e.mode, e.serve || ''].join(','));
  });
  var now = new Date();
  var pad = function(n) { return String(n).padStart(2,'0'); };
  var datePart = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate());
  var timePart = pad(now.getHours()) + pad(now.getMinutes());
  var tzPart = Intl.DateTimeFormat('en', {timeZoneName:'short'}).formatToParts(now).find(function(p){return p.type==='timeZoneName';}).value || 'UTC';
  var slug = function(s) { return s.trim().replace(/[^a-zA-Z0-9]+/g,'_'); };
  var fname = slug(M.names[0]) + '_vs_' + slug(M.names[1]) + '_' + datePart + '_' + timePart + '_' + tzPart + '.csv';
  dl(fname, rows.join('\n'), 'text/csv');
}
function exportJSON() {
  if (!M) return;
  dl('tennis_match.json', JSON.stringify({ players: M.names, format: 'Best of ' + M.totalSets, decidingSet: M.dec, sets: M.completedSets, pointLog: M.pointLog }, null, 2), 'application/json');
}
function dl(name, text, type) {
  var b = new Blob([text], { type: type }), u = URL.createObjectURL(b), a = document.createElement('a');
  a.href = u; a.download = name; a.click(); URL.revokeObjectURL(u);
}
function render() {
  if (!M) return;
  var n = M.totalSets;
  var chSets = document.getElementById('ch-sets'); chSets.innerHTML = '';
  for (var i = 1; i <= n; i++) { var s = document.createElement('span'); s.className = 'ch-lbl'; s.textContent = 'S' + i; chSets.appendChild(s); }
  for (var p = 0; p < 2; p++) {
    document.getElementById('dot' + p).className = 'srv-indicator ' + (M.serving === p ? 'on' : 'off');
    var se = document.getElementById('sets' + p); se.innerHTML = '';
    for (var s = 0; s < M.completedSets.length; s++) { var sp = document.createElement('span'); sp.className = 'set-pip'; sp.textContent = M.completedSets[s][p]; se.appendChild(sp); }
    for (var j = M.completedSets.length; j < n; j++) { var sp = document.createElement('span'); sp.className = 'set-pip dim'; sp.textContent = '-'; se.appendChild(sp); }
    document.getElementById('g' + p).textContent = M.games[p];
    document.getElementById('p' + p).textContent = ptsDisplay(p);
  }
  var st = '';
  if (M.mode === 'tiebreak') st = 'Set ' + (M.completedSets.length + 1) + ' Tiebreak · First to 7';
  else if (M.mode === 'supertb') st = 'Super Tiebreak · First to 10';
  else {
    var pw = M.pts[0], pl = M.pts[1];
    if (pw >= 3 && pl >= 3) st = (pw === pl) ? 'Deuce' : 'Advantage ' + M.names[pw > pl ? 0 : 1];
    else st = 'Set ' + (M.completedSets.length + 1);
  }
  document.getElementById('sb-status').textContent = st;
}
checkResume();
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
